name: Release

# Tag push (v0.2.0) → multi-arch Docker image on ghcr (FINAL item 12: Docker
# is the primary packaging; notify-and-let-host-pull, no in-container apply).
# The Windows zip + update artifact are produced by scripts/package-win.mjs on
# a Windows machine and attached to the GitHub Release by the owner (the
# update artifact must be minisign-signed with the owner-held secret key).
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
